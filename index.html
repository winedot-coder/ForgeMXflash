<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff6b00">
<title>Forge MX Training — Master Your Ride</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --dirt: #1e1208; --mud: #2e1c0d; --panel: #251508; --orange: #ff6b00;
  --orangeHi: #ff8c33; --white: #f2ead8; --dim: #7a6e60;
  --novice: #00b894; --inter: #0984e3; --expert: #e84040; --xpColor: #ffd000;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Barlow',sans-serif; background:var(--dirt); color:var(--white);
  display:flex; flex-direction:column; max-width:480px; margin:0 auto;
  position:relative; user-select:none;
}
.screen { display:none; flex-direction:column; height:100%; overflow:hidden; }
.screen.active { display:flex; }

.card-stage { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; perspective:1400px; }
.card-inner {
  width:100%; max-width:420px; transform-style:preserve-3d; transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1); cursor:pointer;
}
.card-inner.flipped { transform:rotateY(180deg); }
.card-face {
  width:100%; backface-visibility:hidden; border-radius:12px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.6);
}
.card-back-face { position:absolute; top:0; left:0; transform:rotateY(180deg); }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div style="padding:30px 20px; text-align:center;">
    <h1 style="font-family:'Bebas Neue',sans-serif; font-size:3.2rem; color:#ff6b00; letter-spacing:3px;">FORGE MX</h1>
    <p style="font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; color:#ccc; margin:8px 0 20px;">Master Your Ride • Coach Brayden Lessler</p>
    
    <div id="xpDisplay" style="background:rgba(255,107,0,0.15); padding:15px; border-radius:12px; margin:20px 0; border:1px solid rgba(255,107,0,0.3);">
      <strong>Total XP:</strong> <span id="totalXp">0</span>
    </div>

    <div style="margin:30px 0;">
      <button onclick="startLevel('novice')" style="width:90%; background:#00b894; color:white; border:none; padding:18px; font-size:1.3rem; border-radius:10px; margin:10px 0;">🟢 NOVICE LEVEL</button>
      <button onclick="startLevel('intermediate')" style="width:90%; background:#0984e3; color:white; border:none; padding:18px; font-size:1.3rem; border-radius:10px; margin:10px 0;">🔵 INTERMEDIATE LEVEL</button>
      <button onclick="startLevel('expert')" style="width:90%; background:#e84040; color:white; border:none; padding:18px; font-size:1.3rem; border-radius:10px; margin:10px 0;">🔴 EXPERT LEVEL</button>
    </div>

    <button onclick="resetProgress()" style="margin-top:20px; background:none; border:1px solid #666; color:#aaa; padding:10px 20px; border-radius:8px;">↺ Reset All Progress</button>

    <div style="margin-top:40px; font-size:0.9rem; color:#888; line-height:1.5;">
      Strong technique. Steady progress. Real confidence.<br>
      18+ years experience • Personalized motocross coaching
    </div>
  </div>
</div>

<!-- PLAY SCREEN -->
<div class="screen" id="playScreen">
  <div style="padding:12px 16px; background:var(--panel); text-align:center; font-size:1.2rem; font-weight:bold;" id="levelHeader">NOVICE LEVEL</div>
  
  <div class="card-stage">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front-face" style="padding:30px; min-height:300px; text-align:center;">
        <div id="cardEmoji" style="font-size:70px; margin-bottom:20px;"></div>
        <div id="cardQ" style="font-size:1.45rem; line-height:1.25; font-family:'Bebas Neue',sans-serif;"></div>
        <div style="margin-top:40px; font-size:0.95rem; color:#aaa;">Tap card to reveal answer</div>
      </div>
      <div class="card-face card-back-face" style="background:#111; padding:25px; min-height:300px;">
        <div style="color:#ff6b00; font-size:1.1rem; margin-bottom:12px;">ANSWER</div>
        <div id="cardAns" style="line-height:1.65; font-size:1.1rem;"></div>
      </div>
    </div>
  </div>

  <div id="voteRow" style="display:none; padding:15px; gap:12px;">
    <button type="button" id="missedBtn" style="flex:1; padding:16px; background:#555; color:white; border:none; border-radius:8px; font-size:1.15rem;">❌ Missed It</button>
    <button type="button" id="gotBtn" style="flex:1; padding:16px; background:#00b894; color:white; border:none; border-radius:8px; font-size:1.15rem;">✅ Got It!</button>
  </div>

  <div style="padding:15px; text-align:center;">
    <button type="button" onclick="goHome()" style="background:#333; color:#ccc; border:none; padding:12px 24px; border-radius:8px;">← Back to Garage</button>
  </div>
</div>

<script>
// ==================== ALL 60 CARDS (20 per level) ====================
const CARDS = {
  novice: [
    {icon:"🏍️", q:"What is the clutch and when do you use it?", a:"The <strong>clutch</strong> is the lever on the left handlebar. It disconnects the engine from the rear wheel. Use it to start moving, shift gears, and stop without stalling."},
    {icon:"⚙️", q:"How do you shift gears on a dirt bike?", a:"Pull the <strong>clutch lever</strong>, click the gear shifter up or down with your left foot, then release the clutch smoothly."},
    {icon:"🧢", q:"What are the 5 essential pieces of safety gear?", a:"<strong>Helmet</strong> (DOT/SNELL rated), <strong>goggles</strong>, <strong>chest protector</strong>, <strong>gloves</strong>, and <strong>boots</strong>."},
    {icon:"🦵", q:"What is the 'attack position' in motocross?", a:"Stand on the pegs, knees bent and gripping the bike, elbows up, back slightly forward, eyes scanning ahead."},
    {icon:"🌀", q:"Which foot goes forward in a corner?", a:"Your <strong>outside foot</strong> goes forward on the peg."},
    {icon:"🏁", q:"What is a 'berm' and how do you ride it?", a:"A <strong>berm</strong> is a banked corner of built-up dirt. Ride into it, let it redirect your bike, then accelerate hard as you exit."},
    {icon:"🛑", q:"What are the two brakes and where are they located?", a:"Front brake = right handlebar lever. Rear brake = right foot pedal."},
    {icon:"🔧", q:"How often should you check tire pressure?", a:"Check before every ride. Motocross tires typically run 12–14 PSI."},
    {icon:"👀", q:"Where should your eyes be when riding?", a:"Always 3–5 seconds ahead of your current position."},
    {icon:"⛽", q:"What does it mean when your 2-stroke four-strokes?", a:"Four-stroking means the engine is running too rich. It sounds chuggy instead of crisp."},
    {icon:"🤲", q:"What is engine braking?", a:"When you close the throttle, the engine compression slows the bike."},
    {icon:"🔂", q:"What does 'looking through the corner' mean?", a:"Turn your head and eyes toward the exit of the corner as early as possible."},
    {icon:"⚠️", q:"What do you do if your throttle sticks open?", a:"Pull the clutch immediately, then hit the kill switch."},
    {icon:"🛞", q:"Why is chain tension important?", a:"A loose chain can derail or snap and lock the rear wheel."},
    {icon:"💨", q:"How should a beginner approach a whoop section?", a:"Slow down, stay seated, and absorb each whoop with bent knees."},
    {icon:"🌡️", q:"Why warm up your bike before riding hard?", a:"Warm it for 2–3 minutes so oil circulates properly."},
    {icon:"🏔️", q:"How should you position your body when going downhill?", a:"Shift weight back and low, cover both brakes."},
    {icon:"🤸", q:"How do you use your legs on the bike as a beginner?", a:"Your legs are the main shock absorbers. Keep knees bent and gripping."},
    {icon:"📏", q:"What is the safe following distance?", a:"At least 3–5 bike lengths."},
    {icon:"🔴", q:"When should you hit the kill switch?", a:"Any time you need to stop the bike instantly."}
  ],
  intermediate: [
    {icon:"🎯", q:"Difference between inside and outside line in a corner?", a:"Inside is shortest but less traction. Outside uses the berm for better grip and speed."},
    {icon:"🔄", q:"What is pre-loading a jump?", a:"Compressing the suspension just before the lip to launch better and control body position."},
    {icon:"📐", q:"How do you correct a nose-high situation in the air?", a:"Apply a small burst of rear brake to bring the nose down."},
    {icon:"🌊", q:"What is a rhythm section?", a:"Series of closely spaced jumps. Goal is to find the fastest smooth combination."},
    {icon:"⚡", q:"What is throttle control in corners?", a:"Smoothly managing power — slightly off at entry, neutral at apex, accelerate on exit."},
    {icon:"🚦", q:"What is the holeshot?", a:"Reaching the first corner in first place. Requires good gate pick and explosive start."},
    {icon:"🏋️", q:"Why is grip strength important?", a:"Prevents arm pump. Train with dead hangs and farmer carries."},
    {icon:"🛞", q:"When to replace air filter?", a:"After every ride if it's dirty, oily, or clogged."},
    {icon:"💧", q:"How much should you drink on race day?", a:"16–20 oz 2 hours before, then sip consistently. Add electrolytes in heat."},
    {icon:"🧠", q:"What does 'managing a gap' mean?", a:"Riding at 95% effort once you have a lead to reduce crash risk."},
    {icon:"🌪️", q:"How do you ride a rut correctly?", a:"Ride deep into the rut, let it guide the front wheel, and drive hard out."},
    {icon:"📊", q:"How do you gate-pick properly?", a:"Choose the gate that gives the straightest line to the first corner apex."},
    {icon:"🔁", q:"How do you approach a double for the first time?", a:"Walk it, visualize, approach at correct speed, look at landing."},
    {icon:"🏃", q:"Best off-bike cardio for motocross?", a:"Cycling, trail running, swimming, and HIIT."},
    {icon:"🌡️", q:"Why check coolant on a 4-stroke?", a:"To prevent overheating and engine seizure."},
    {icon:"📍", q:"What is a block pass?", a:"Entering a corner in front to force opponent wide. Most effective with late braking."},
    {icon:"🎛️", q:"What does tire knob pattern affect?", a:"Traction on different surfaces. Tall knobs for soft/mud, shorter for hard-pack."},
    {icon:"🧘", q:"How to handle crashing mentally?", a:"Assess injury quickly, get up, and focus on the next corner. Don't replay it."},
    {icon:"⏱️", q:"What is a moto format?", a:"Timed race, usually 20–30 minutes + 2 laps. Overall result based on multiple motos."},
    {icon:"🔦", q:"What is track walk and why important?", a:"Walking the track before riding to study lines, jumps, and hazards."}
  ],
  expert: [
    {icon:"🏆", q:"What is blocking a pass and when is it legal?", a:"Positioning your bike to make passing harder. Legal before corner entry."},
    {icon:"🎛️", q:"What is sag and how does it affect handling?", a:"How much suspension compresses under rider weight. Target 100–105mm race sag."},
    {icon:"🔬", q:"What does increasing compression damping do?", a:"Makes suspension stiffer on big hits for better control."},
    {icon:"💨", q:"How do you execute a scrub on a jump?", a:"Lean and whip the bike sideways across the jump face to stay low and maintain speed."},
    {icon:"🧩", q:"How do you set up a pass in a corner?", a:"Out-brake opponent, take inside line, be alongside before the apex."},
    {icon:"📊", q:"What is a structured training block?", a:"Periodized program with build, peak, and recovery phases."},
    {icon:"🏔️", q:"What is VO2 max and why important?", a:"Maximum oxygen consumption. Higher = faster recovery during motos."},
    {icon:"🎯", q:"What is visualization before a race?", a:"Mentally rehearsing a perfect lap. Used by top riders like Carmichael and Dungey."},
    {icon:"🔩", q:"How do you check chain tension?", a:"With rider on bike, about 1.5 inches of play at the tightest point."},
    {icon:"📡", q:"How do you ride in wet/muddy conditions?", a:"Lower tire pressure, smoother lines, gentle throttle."},
    {icon:"🔭", q:"What is rebound damping?", a:"Controls how fast suspension extends after compression."},
    {icon:"🧬", q:"What is lactate threshold training?", a:"Training near the point where lactic acid builds up to raise sustainable race pace."},
    {icon:"🏎️", q:"How do you manage tire wear during a moto?", a:"Adjust lines as grip drops, avoid aggressive wheelspin."},
    {icon:"🌐", q:"What is the points structure at Loretta Lynn's?", a:"Points from 3 motos determine who advances and earns a national number."},
    {icon:"📈", q:"What is periodization in training?", a:"Dividing the year into base, build, peak, and recovery phases."},
    {icon:"🤝", q:"What is linkage and why important?", a:"Connects shock to swingarm. Worn bearings make rear suspension vague."},
    {icon:"🧠", q:"How do elite riders manage race anxiety?", a:"Reframe it as readiness and use controlled breathing routines."},
    {icon:"🌿", q:"Nutrition timing on race day?", a:"Carb-rich meal 3 hours before, small snack 30–45 min before."},
    {icon:"⚖️", q:"How does fork height in triple clamps affect handling?", a:"Raising forks quickens steering but reduces stability."},
    {icon:"🔑", q:"What is controlled aggression?", a:"Riding at maximum commitment without exceeding your limits."}
  ]
};

let state = { totalXp: 0 };

function loadState() {
  const saved = localStorage.getItem('forgeMX');
  if (saved) state = JSON.parse(saved);
  document.getElementById('totalXp').textContent = state.totalXp || 0;
}

function saveState() {
  localStorage.setItem('forgeMX', JSON.stringify(state));
  document.getElementById('totalXp').textContent = state.totalXp || 0;
}

let currentDeck = [];
let currentIdx = 0;
let flipped = false;
let currentLevel = '';

function startLevel(level) {
  loadState();
  currentLevel = level;
  currentDeck = CARDS[level] || CARDS.novice;
  currentIdx = 0;
  flipped = false;

  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('playScreen').classList.add('active');
  document.getElementById('levelHeader').textContent = level.toUpperCase() + " LEVEL";

  renderCard();
}

function renderCard() {
  if (currentIdx >= currentDeck.length) {
    alert(`🎉 ${currentLevel.toUpperCase()} Level Complete!\n\nYou've earned XP for this session.`);
    goHome();
    return;
  }
  const c = currentDeck[currentIdx];
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('voteRow').style.display = 'none';
  document.getElementById('cardEmoji').textContent = c.icon;
  document.getElementById('cardQ').innerHTML = c.q;
  document.getElementById('cardAns').innerHTML = c.a;
}

function flipCard() {
  if (!flipped) {
    flipped = true;
    document.getElementById('cardInner').classList.add('flipped');
    document.getElementById('voteRow').style.display = 'flex';
  }
}

function vote(correct) {
  if (correct) {
    state.totalXp = (state.totalXp || 0) + 10;
    saveState();
    alert("✅ Excellent! +10 XP");
  } else {
    alert("❌ Keep practicing. You'll get it next time.");
  }
  currentIdx++;
  renderCard();
}

function goHome() {
  document.getElementById('playScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
}

function resetProgress() {
  if (confirm("Reset all XP and progress? This cannot be undone.")) {
    localStorage.removeItem('forgeMX');
    state = { totalXp: 0 };
    document.getElementById('totalXp').textContent = 0;
    alert("Progress has been reset.");
  }
}

// Event Listeners
document.getElementById('cardInner').addEventListener('click', flipCard);
document.getElementById('gotBtn').addEventListener('click', () => vote(true));
document.getElementById('missedBtn').addEventListener('click', () => vote(false));

loadState();
console.log("✅ Forge MX Training - Full 60 Cards + Gamification Loaded");
</script>
</body>
</html>
