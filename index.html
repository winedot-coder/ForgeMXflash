<style>

  cursor:pointer;

</style>
</head>
<body>

<!-- Your HTML structure stays the same until the script -->
<!-- ... (homeScreen, playScreen, resultScreen, install banner) ... -->

<!-- PLAY SCREEN (only showing the important changed part) -->
<div class="screen" id="playScreen">
  <!-- header, xp strip, cat ribbon, card stage remain the same -->

  <div class="vote-row" id="voteRow" style="display:none">
    <button type="button" class="vote-btn vote-missed" id="missedBtn">❌ Missed It</button>
    <button type="button" class="vote-btn vote-got" id="gotBtn">✅ Got It!</button>
  </div>

  <div class="play-nav">
    <button type="button" class="nav-btn nav-prev" onclick="prevCard()">←</button>
    <button type="button" class="nav-btn nav-shuffle" onclick="shuffleDeck()">⇌</button>
    <button type="button" class="nav-btn nav-next" onclick="nextCard()">NEXT →</button>
  </div>
</div>

<!-- Rest of your HTML (result screen, install banner) remains the same -->

<script>
// ==================== CARD DATA (keep all your original CARDS, BADGE_DEFS, etc.) ====================
const CARDS = {
  novice: [ /* paste all your novice cards here */ ],
  intermediate: [ /* paste all your intermediate cards here */ ],
  expert: [ /* paste all your expert cards here */ ]
};

// Keep all your state, ranks, renderHome, startLevel, renderCard, finishSession, etc. exactly as before

let state = loadState();
let currentLevel = 'novice';
let deck = [];
let idx = 0;
let flipped = false;
let sessionCorrect = 0;
let sessionXp = 0;
let streak = 0;
let bestStreak = 0;

// ... (your other functions: defaultState, loadState, saveState, getRank, renderHome, startLevel, renderCard, updatePlayXp, showXpPopup, finishSession, playAgain, goHome, resetProgress, showScreen) ...

// ==================== IMPROVED FLIP & VOTE ====================
function flipCard() {
  if (!flipped) {
    flipped = true;
    const card = document.getElementById('cardInner');
    card.classList.add('flipped');
    document.getElementById('voteRow').style.display = 'flex';
    void card.offsetWidth; // force reflow for mobile
  }
}

function vote(correct) {
  console.log('Vote called:', correct ? 'Got It' : 'Missed It'); // for debugging
  const xpEarned = correct ? (5 + streak * 2) : 0;
  if (correct) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    sessionCorrect++;
    sessionXp += xpEarned;
    state.totalXp += xpEarned;
    if (xpEarned > 0) showXpPopup('+' + xpEarned + ' XP');
  } else {
    streak = 0;
  }
  document.getElementById('streakVal').textContent = streak;
  updatePlayXp();
  saveState();
  nextCard();
}

// ==================== EVENT LISTENERS (this is the key fix) ====================
function initCardListeners() {
  const cardInner = document.getElementById('cardInner');
  const missedBtn = document.getElementById('missedBtn');
  const gotBtn = document.getElementById('gotBtn');

  // Tap anywhere on card to flip
  cardInner.addEventListener('click', flipCard);

  // Vote buttons - using both inline and listeners for maximum compatibility
  missedBtn.addEventListener('click', () => vote(false));
  gotBtn.addEventListener('click', () => vote(true));

  // Touch swipe for navigation (after flipped)
  let touchStartX = 0;
  cardInner.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  cardInner.addEventListener('touchend', e => {
    if (!flipped) {
      flipCard();
      return;
    }
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 80) {
      if (dx < 0) nextCard();
      else prevCard();
    }
  }, { passive: true });
}

// Call this after the card is rendered
function renderCard() {
  // ... your original renderCard code ...
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('voteRow').style.display = 'none';
  // ... rest of your card population code ...

  // Re-attach listeners after rendering new card
  setTimeout(initCardListeners, 10);
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (document.getElementById('playScreen').classList.contains('active')) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    else if (e.key === 'ArrowRight') { if (flipped) nextCard(); else flipCard(); }
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key.toLowerCase() === 'g') { if (flipped) vote(true); }
    else if (e.key.toLowerCase() === 'm') { if (flipped) vote(false); }
  }
});

// Initial setup
renderHome();
</script>
</body>
</html>
